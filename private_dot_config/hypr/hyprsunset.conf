# sunsetr owns this daemon: it spawns hyprsunset itself (backend = "hyprsunset")
# and drives temperature/gamma over IPC from solar times. Deliberately no
# profile blocks here -- hyprsunset applying its own fixed-time schedule would
# fight sunsetr for the same CTM.
#
# gamma here is a multiplier (1.0 == 100%), not a percentage.
max-gamma = 100
